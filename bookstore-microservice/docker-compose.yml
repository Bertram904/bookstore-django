# BookStore Microservices - Assignment 05
# Mỗi service có database riêng (Database per Service)

services:
  customer-service:
    build: ./customer-service
    ports: ["8001:8000"]
    environment:
      - CART_SERVICE_URL=http://cart-service:8000
      - DEBUG=1
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_PASSWORD=admin123
    volumes: ["./customer-service:/app"]

  staff-service:
    build: ./staff-service
    ports: ["8002:8000"]
    environment:
      - BOOK_SERVICE_URL=http://book-service:8000
      - DEBUG=0
    volumes: ["./staff-service:/app"]

  manager-service:
    build: ./manager-service
    ports: ["8003:8000"]
    environment:
      - CUSTOMER_SERVICE_URL=http://customer-service:8000
      - BOOK_SERVICE_URL=http://book-service:8000
      - ORDER_SERVICE_URL=http://order-service:8000
      - DEBUG=0
    volumes: ["./manager-service:/app"]

  catalog-service:
    build: ./catalog-service
    ports: ["8004:8000"]
    environment:
      - BOOK_SERVICE_URL=http://book-service:8000
      - DEBUG=0
    volumes: ["./catalog-service:/app"]

  book-service:
    build: ./book-service
    ports: ["8005:8000"]
    environment:
      - DEBUG=1
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_PASSWORD=admin123
    volumes: ["./book-service:/app"]

  cart-service:
    build: ./cart-service
    ports: ["8006:8000"]
    environment:
      - CUSTOMER_SERVICE_URL=http://customer-service:8000
      - BOOK_SERVICE_URL=http://book-service:8000
      - DEBUG=0
    volumes: ["./cart-service:/app"]

  order-service:
    build: ./order-service
    ports: ["8007:8000"]
    environment:
      - CART_SERVICE_URL=http://cart-service:8000
      - PAY_SERVICE_URL=http://pay-service:8000
      - SHIP_SERVICE_URL=http://ship-service:8000
      - BOOK_SERVICE_URL=http://book-service:8000
      - DEBUG=0
    volumes: ["./order-service:/app"]

  ship-service:
    build: ./ship-service
    ports: ["8008:8000"]
    environment:
      - DEBUG=0
    volumes: ["./ship-service:/app"]

  pay-service:
    build: ./pay-service
    ports: ["8009:8000"]
    environment:
      - DEBUG=0
    volumes: ["./pay-service:/app"]

  comment-rate-service:
    build: ./comment-rate-service
    ports: ["8010:8000"]
    environment:
      - BOOK_SERVICE_URL=http://book-service:8000
      - DEBUG=0
    volumes: ["./comment-rate-service:/app"]

  recommender-ai-service:
    build: ./recommender-ai-service
    ports: ["8011:8000"]
    environment:
      - BOOK_SERVICE_URL=http://book-service:8000
      - COMMENT_RATE_SERVICE_URL=http://comment-rate-service:8000
      - DEBUG=0
    volumes: ["./recommender-ai-service:/app"]

  api-gateway:
    build: ./api-gateway
    ports: ["8000:8000"]
    environment:
      - CUSTOMER_SERVICE_URL=http://customer-service:8000
      - STAFF_SERVICE_URL=http://staff-service:8000
      - MANAGER_SERVICE_URL=http://manager-service:8000
      - CATALOG_SERVICE_URL=http://catalog-service:8000
      - BOOK_SERVICE_URL=http://book-service:8000
      - CART_SERVICE_URL=http://cart-service:8000
      - ORDER_SERVICE_URL=http://order-service:8000
      - SHIP_SERVICE_URL=http://ship-service:8000
      - PAY_SERVICE_URL=http://pay-service:8000
      - COMMENT_RATE_SERVICE_URL=http://comment-rate-service:8000
      - RECOMMENDER_SERVICE_URL=http://recommender-ai-service:8000
      - DEBUG=1
    depends_on:
      - customer-service
      - book-service
      - cart-service
      - order-service
      - ship-service
      - pay-service
      - comment-rate-service
      - recommender-ai-service
      - staff-service
      - manager-service
      - catalog-service
    volumes: ["./api-gateway:/app"]

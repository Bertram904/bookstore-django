{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BookStore Microservices{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    {% csrf_token %}
    <header class="site-header">
        <div class="top-bar">
            <div class="top-bar-inner container">
                <div class="top-logo"><a href="/">BookStore</a></div>
                <div id="header-user" class="top-user-links"></div>
            </div>
        </div>
        <div class="header-inner container">
            <a href="/" class="logo">BookStore</a>
            <nav class="nav-main">
                <a href="/">Trang chủ</a>
                <a href="/cart/" id="nav-cart">Giỏ hàng</a>
                <a href="/staff/">Quản lý sách</a>
                <a href="/manager/">Dashboard</a>
                <a href="/admin-center/">Admin Center</a>
            </nav>
        </div>
    </header>
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <div class="footer-inner">
            <p>BookStore Microservices — Assignment 05 · Django REST Framework</p>
        </div>
    </footer>
    <script src="{% static 'js/app.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
